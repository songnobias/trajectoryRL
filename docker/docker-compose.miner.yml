# TrajectoryRL Miner — Production Compose
#
# Setup:
#   1. cp .env.miner.example .env.miner   # fill in credentials
#   2. docker compose -f docker/docker-compose.miner.yml up -d
#   3. docker compose -f docker/docker-compose.miner.yml logs -f miner
#
# Demo mode (no API key / S3 needed):
#   MODE=demo docker compose -f docker/docker-compose.miner.yml up -d
#
# See MINER_OPERATIONS.md for full CLI reference.

services:
  # --------------------------------------------------------------------------
  # Miner: LLM generate → build pack → upload → submit on-chain (loop)
  # --------------------------------------------------------------------------
  miner:
    build:
      context: ..
      dockerfile: docker/Dockerfile.miner
    container_name: trajectoryrl_miner
    restart: unless-stopped
    command: ["python", "-u", "neurons/miner.py", "run", "--mode", "${MODE:-default}"]
    env_file: ../.env.miner
    volumes:
      - ~/.bittensor/wallets:/root/.bittensor/wallets:ro
      - miner-packs:/app/packs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  miner-packs:
